name: Build Windows x64

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Build Release x64
        run: msbuild MeshAgent-2022.sln /p:Configuration=Release /p:Platform=x64 /m /nologo /verbosity:minimal

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MeshService64-windows
          path: Release\MeshService64.exe
          if-no-files-found: error
